# Self-completing one-off: downloads the link-shared classroom photo from
# Google Drive on a runner (open egress), embeds it as base64 into the app,
# verifies everything, commits the result, and removes itself. Retries on a
# schedule until the Drive file's link-sharing makes the download possible.
name: Embed moment photo
on:
  push:
    branches: [main]
  schedule:
    - cron: '*/15 * * * *'
permissions:
  contents: write
concurrency: embed-moment-photo
jobs:
  embed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Skip if the photo is already embedded
        id: guard
        run: |
          if [ -f apps/web/src/assets/moment-photo.jpg ]; then echo "skip=true" >> "$GITHUB_OUTPUT"; echo "Photo already present — nothing to do."; fi
      - name: Download from Google Drive
        id: fetch
        if: steps.guard.outputs.skip != 'true'
        run: |
          curl -sSL --max-time 120 -o /tmp/raw.img "https://drive.usercontent.google.com/download?id=1aEHxjYQjX-hlNSi6-AT7GRQGLeiygwou&export=download"
          mime=$(file --mime-type -b /tmp/raw.img)
          echo "Downloaded $(wc -c < /tmp/raw.img) bytes, type: $mime"
          case "$mime" in
            image/*) echo "ok=true" >> "$GITHUB_OUTPUT";;
            *) echo "File is not yet link-shared (got $mime) — will retry on the next schedule.";;
          esac
      - name: Optimize to a bundle-friendly JPEG
        if: steps.fetch.outputs.ok == 'true'
        run: |
          sudo apt-get update -qq >/dev/null && sudo apt-get install -y -qq imagemagick >/dev/null
          convert /tmp/raw.img -auto-orient -resize '1600x1600>' -strip -quality 82 apps/web/src/assets/moment-photo.jpg
          ls -la apps/web/src/assets/
      - name: Embed, verify, and rebuild
        if: steps.fetch.outputs.ok == 'true'
        run: |
          npm ci
          node scripts/embed-moment-photo.mjs
          npm run typecheck
          npm run lint
          npm test
          npm run build
          node scripts/bundle-api.mjs
          node scripts/build-standalone.mjs
      - name: Commit the embedded photo and remove this workflow
        if: steps.fetch.outputs.ok == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -q .github/workflows/embed-moment-photo.yml
          git add apps/web/src/assets/moment-photo.jpg apps/web/src/assets/momentPhoto.ts child-compass-local.html api/index.mjs
          git commit -m "Embed the real classroom moment photo as base64 in the bundle"
          git push origin HEAD:main
