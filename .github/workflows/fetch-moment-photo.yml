# One-off helper: pulls the link-shared classroom photo from Google Drive on a
# GitHub runner (which has open egress), optimizes it, and commits it so the
# development environment can embed it. Self-skips once the photo exists;
# removed entirely after the photo is embedded.
name: Fetch moment photo
on:
  push:
    branches: [claude/child-compass-admin-reports-6hah90]
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Skip if the photo is already committed
        id: guard
        run: |
          if [ -f apps/web/src/assets/moment-photo.jpg ]; then echo "skip=true" >> "$GITHUB_OUTPUT"; echo "Photo already present — nothing to do."; fi
      - name: Download from Google Drive
        if: steps.guard.outputs.skip != 'true'
        run: |
          curl -sSL --max-time 120 -o /tmp/raw.img "https://drive.usercontent.google.com/download?id=1aEHxjYQjX-hlNSi6-AT7GRQGLeiygwou&export=download"
          mime=$(file --mime-type -b /tmp/raw.img)
          echo "Downloaded $(wc -c < /tmp/raw.img) bytes, type: $mime"
          case "$mime" in image/*) ;; *) echo "Not an image — Drive may have returned an interstitial page"; head -c 400 /tmp/raw.img; exit 1;; esac
      - name: Optimize to a bundle-friendly JPEG
        if: steps.guard.outputs.skip != 'true'
        run: |
          sudo apt-get update -qq >/dev/null && sudo apt-get install -y -qq imagemagick >/dev/null
          convert /tmp/raw.img -auto-orient -resize '1600x1600>' -strip -quality 82 apps/web/src/assets/moment-photo.jpg
          ls -la apps/web/src/assets/
      - name: Commit the photo
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/assets/moment-photo.jpg
          git commit -m "Add classroom moment photo source asset"
          git push
